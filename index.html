<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Grievance Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Navigation -->
        <nav class="glass-nav">
            <div class="logo">
                <span class="logo-icon">🌿</span>
                <span class="logo-text">CivicAI</span>
            </div>
            <div class="nav-links">
                <button id="btn-citizen" class="nav-btn active">Citizen Portal</button>
                <button id="btn-authority" class="nav-btn">Authority Dashboard</button>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            
            <!-- View: Citizen Portal (Chatbot) -->
            <section id="view-citizen" class="view active">
                <div class="chat-container glass-panel">
                    <div class="chat-header">
                        <h2>Report an Issue</h2>
                        <p>Hi! I'm your AI assistant. Tell me what needs fixing in your area.</p>
                    </div>
                    
                    <div class="chat-messages" id="chat-messages">
                        <div class="message bot-message">
                            <div class="message-bubble">
                                Hello! Please describe the issue you are facing. For example, "There is a water leak near the central park."
                            </div>
                        </div>
                    </div>

                    <div class="chat-input-area">
                        <form id="chat-form">
                            <input type="text" id="chat-input" placeholder="Type your complaint here..." autocomplete="off" required>
                            <button type="button" class="location-btn" title="Attach Location" id="location-btn">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                            </button>
                            <button type="submit" class="send-btn">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                            </button>
                        </form>
                    </div>
                </div>
            </section>

            <!-- View: Authority Dashboard -->
            <section id="view-authority" class="view hidden">
                <div class="dashboard-header">
                    <h2>Live Grievance Dashboard</h2>
                    <div class="dashboard-stats">
                        <div class="stat-card glass-panel">
                            <span class="stat-value" id="stat-total">0</span>
                            <span class="stat-label">Total Reports</span>
                        </div>
                        <div class="stat-card glass-panel">
                            <span class="stat-value" id="stat-high">0</span>
                            <span class="stat-label">High Priority</span>
                        </div>
                        <div class="stat-card glass-panel">
                            <span class="stat-value" id="stat-resolved">0</span>
                            <span class="stat-label">Resolved</span>
                        </div>
                    </div>
                </div>
                
                <div class="dashboard-controls">
                    <select id="filter-dept" class="glass-select">
                        <option value="All">All Departments</option>
                        <option value="Water">Water Department</option>
                        <option value="Roads">Roads & Transport</option>
                        <option value="Sanitation">Sanitation</option>
                        <option value="Electrical">Electrical</option>
                        <option value="General">General Admin</option>
                    </select>
                </div>

                <div class="complaints-grid" id="complaints-grid">
                    <!-- Cards will be populated by JS -->
                </div>
            </section>

        </main>
    </div>
    
    <!-- Template for Complaint Card (Hidden) -->
    <template id="card-template">
        <div class="complaint-card glass-panel">
            <div class="card-header">
                <span class="complaint-id"></span>
                <span class="priority-badge"></span>
            </div>
            <h3 class="complaint-summary"></h3>
            <p class="complaint-desc"></p>
            <div class="card-footer">
                <div class="dept-badge">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    <span class="dept-name"></span>
                </div>
                <button class="resolve-btn">Mark Resolved</button>
            </div>
        </div>
    </template>

    <script src="js/ai-mock.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
